<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>준비 중 | Myeoungjun</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: url('bg.png') center center / cover no-repeat fixed;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 1rem 2rem;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    header img {
      height: 48px;
      display: block;
    }

    .container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      color: #f0f0f0;
    }

    p {
      font-size: 1rem;
      color: #aaa;
      line-height: 1.6;
    }

    .domain {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Watts 로고">
  </header>
  <div class="container">
    <h1>사이트 준비 중입니다</h1>
    <p>더 나은 모습으로 곧 찾아올게요.</p>
    <p class="domain">www.myeoungjun.co.kr</p>
  </div>
</body>
</html>
