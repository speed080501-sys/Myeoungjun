<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>준비 중 | Myeoungjun</title>
  <style>
    @property --spot-x {
      syntax: '<percentage>';
      inherits: false;
      initial-value: 50%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: url('bg.png') center center / cover no-repeat fixed;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    @keyframes spotMove {
      from { --spot-x: 25%; }
      to   { --spot-x: 75%; }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        circle at var(--spot-x) 58%,
        transparent 0%,
        transparent 30%,
        rgba(28, 14, 5, 0.7) 46%,
        rgba(28, 14, 5, 0.97) 62%
      );
      animation: spotMove 3s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes headerSlide {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      padding-top: 5px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      background: linear-gradient(
        120deg,
        rgba(90,46,18,0.6) 0%,
        rgba(122,62,26,0.6) 30%,
        rgba(61,28,9,0.6) 60%,
        rgba(90,46,18,0.6) 100%
      );
      background-size: 300% 100%;
      animation: headerSlide 6s ease-in-out infinite;
    }

    .logo-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 5px 1.2rem;
    }

    .logo-wrap img {
      height: 96px;
      display: block;
    }

    .header-title {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    @keyframes titleEntrance {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-title h1 {
      font-size: calc(2rem - 3px);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #f0f0f0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      white-space: nowrap;
      opacity: 0;
      animation: titleEntrance 0.7s ease-out 1s forwards;
    }

    .container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 30%;
    }

    .container h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #f0f0f0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-wrap">
      <img src="logo.png" alt="Watts 로고">
    </div>
    <div class="header-title">
      <h1>홈페이지 오픈 준비 중입니다</h1>
    </div>
  </header>
  <div class="container"></div>
</body>
</html>
