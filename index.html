<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>준비 중 | Myeoungjun</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: spin 6s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      color: #f0f0f0;
    }

    p {
      font-size: 1rem;
      color: #888;
      line-height: 1.6;
    }

    .domain {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #444;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚙️</div>
    <h1>사이트 준비 중입니다</h1>
    <p>더 나은 모습으로 곧 찾아올게요.</p>
    <p class="domain">www.myeoungjun.co.kr</p>
  </div>
</body>
</html>
