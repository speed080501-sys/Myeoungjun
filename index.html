<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>준비 중 | Myeoungjun</title>
  <style>
    @property --spot-x {
      syntax: '<percentage>';
      inherits: false;
      initial-value: 50%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: url('bg.png') center center / cover no-repeat fixed;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    @keyframes spotMove {
      0%   { --spot-x: 25%; }
      50%  { --spot-x: 75%; }
      100% { --spot-x: 25%; }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        circle at var(--spot-x) 58%,
        transparent 0%,
        transparent 30%,
        rgba(28, 14, 5, 0.7) 46%,
        rgba(28, 14, 5, 0.97) 62%
      );
      animation: spotMove 5s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes headerSlide {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      position: relative;
      z-index: 1;
      padding: 1rem 2rem;
      background: linear-gradient(
        120deg,
        #5a2e12 0%,
        #7a3e1a 30%,
        #3d1c09 60%,
        #5a2e12 100%
      );
      background-size: 300% 100%;
      animation: headerSlide 6s ease-in-out infinite;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    header img {
      height: 48px;
      display: block;
    }

    .container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      color: #f0f0f0;
    }

    p {
      font-size: 1rem;
      color: #aaa;
      line-height: 1.6;
    }

    .domain {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Watts 로고">
  </header>
  <div class="container">
    <h1>사이트 준비 중입니다</h1>
    <p>더 나은 모습으로 곧 찾아올게요.</p>
    <p class="domain">www.myeoungjun.co.kr</p>
  </div>
</body>
</html>
