<script>
(() => {
  const routes = [
    { pattern: /^watts$/i, href: "index.html" },
    { pattern: /^home$/i, href: "index.html" },
    { pattern: /^search$/i, href: "products.html" },
    { pattern: /^stores$/i, href: "stores.html" },
    { pattern: /^my page$/i, href: "brand-story.html" },
    { pattern: /^store locator$/i, href: "stores.html" },
    { pattern: /전체보기|제품 구경하기/i, href: "products.html" },
    { pattern: /브랜드 스토리 보기/i, href: "brand-story.html" },
    { pattern: /방문 예약하기|길찾기/i, href: "stores.html" },
    { pattern: /^menu$/i, href: "brand-story.html" }
  ];

  const getLabel = (element) =>
    (element.innerText || element.getAttribute("aria-label") || "")
      .replace(/\s+/g, " ")
      .trim();

  const findRoute = (element) => {
    const label = getLabel(element);
    const icon = element.querySelector(".material-symbols-outlined")?.textContent?.trim();
    return routes.find((route) => route.pattern.test(label)) ||
      routes.find((route) => icon && route.pattern.test(icon));
  };

  document.querySelectorAll("a, button, header h1, header div[class*='font-display']").forEach((element) => {
    const route = findRoute(element);
    if (!route) return;

    if (element.tagName === "A") {
      element.href = route.href;
      return;
    }

    element.tabIndex = 0;
    element.setAttribute("role", "link");
    element.style.cursor = "pointer";
    element.addEventListener("click", () => {
      window.location.href = route.href;
    });
    element.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        window.location.href = route.href;
      }
    });
  });
})();
</script>
